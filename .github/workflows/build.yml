name: Build APK

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      # ===== 1. 检出代码 =====
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ===== 2. 配置 JDK 17 =====
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ===== 3. Android SDK（命令行版）=====
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ===== 3.5 安装 gradle 并生成 wrapper =====
      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # 不使用 Gradle 内置缓存（避免 GitHub 缓存服务故障）
          cache-disabled: true

      # ===== 4. 决定构建类型 =====
      - name: Determine build type
        id: buildtype
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=debug" >> $GITHUB_OUTPUT
          fi

      # ===== 5. 配置 release 签名（仅 release 构建需要）=====
      - name: Decode release keystore
        if: steps.buildtype.outputs.type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::RELEASE_KEYSTORE_BASE64 未配置，release 构建将失败"
            exit 1
          fi
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/release.jks
          ls -la app/keystore/release.jks

      # ===== 6. 写入签名属性（仅 release）=====
      - name: Write keystore.properties
        if: steps.buildtype.outputs.type == 'release'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=keystore/release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      # ===== 7. 给 Gradle 执行权限 =====
      - name: Generate gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            echo "gradlew 不存在，用裸 gradle 生成 wrapper"
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew
          ls -la ./gradlew gradle/wrapper/

      # ===== 8. 编译（最朴素的写法，不再依赖任何第三方 Gradle action）=====
      - name: Run ${{ steps.buildtype.outputs.type }} build
        run: |
          if [ "${{ steps.buildtype.outputs.type }}" = "release" ]; then
            ./gradlew assembleRelease \
              --no-daemon \
              --no-build-cache \
              --no-configuration-cache \
              -Pandroid.injected.signing.store.file=keystore/release.jks
          else
            ./gradlew assembleDebug \
              --no-daemon \
              --no-build-cache \
              --no-configuration-cache
          fi

      # ===== 9. 验证 APK 产出 =====
      - name: Verify APK output
        run: |
          echo "===== 产出列表 ====="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo ""
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            echo "===== APK badging ====="
            $ANDROID_HOME/build-tools/*/aapt dump badging "$APK" 2>/dev/null | head -5 || true
          fi

      # ===== 10. 上传 APK 为 artifact =====
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: teleprompter-${{ steps.buildtype.outputs.type }}-apk
          path: |
            app/build/outputs/apk/${{ steps.buildtype.outputs.type }}/*.apk
            app/build/outputs/apk/${{ steps.buildtype.outputs.type }}/*.json
          if-no-files-found: error
          retention-days: 30

      # ===== 10.5 把 APK 推到 dist/ 目录，免登录下载 =====
      - name: Publish APK to dist/
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -e
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ 没找到 APK"
            exit 1
          fi
          mkdir -p dist
          cp "$APK" "dist/teleprompter-${{ steps.buildtype.outputs.type }}.apk"
          APK_INFO=$(ls -lh "dist/teleprompter-${{ steps.buildtype.outputs.type }}.apk" | awk '{print $5}')
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT=$(echo "$GITHUB_SHA" | cut -c1-7)
          cat > dist/latest.json <<EOF
          {
            "build_type": "${{ steps.buildtype.outputs.type }}",
            "commit": "$COMMIT",
            "built_at": "$BUILD_TIME",
            "size": "$APK_INFO",
            "download_url": "https://raw.githubusercontent.com/lvkaik/teleprompter/main/dist/teleprompter-${{ steps.buildtype.outputs.type }}.apk"
          }
          EOF
          cat dist/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --cached --quiet; then
            echo "dist/ 没有变化，跳过提交"
          else
            git commit -m "ci: 发布 ${{ steps.buildtype.outputs.type }} APK ($COMMIT)"
            git push
            echo "✅ APK 已推送到 dist/"
          fi

      # ===== 11. 单元测试报告（可选）=====
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 7