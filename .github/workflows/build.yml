name: Build APK

# 触发条件：
# - push 到 main / develop
# - 任何 Pull Request
# - 手动触发（Actions 页面 → Run workflow）
on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      # ===== 1. 检出代码 =====
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ===== 2. 配置 JDK 17 =====
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ===== 3. 设置 Gradle 缓存 =====
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}
          gradle-home-cache-cleanup: true

      # ===== 4. 给 Gradle 执行权限 =====
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ===== 5. 决定构建类型 =====
      - name: Determine build type
        id: buildtype
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            # PR 或 push 默认 debug，避免 CI 误签 release
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
              echo "type=debug" >> $GITHUB_OUTPUT
            else
              echo "type=debug" >> $GITHUB_OUTPUT
            fi
          fi

      # ===== 6. 配置 release 签名（仅 release 构建需要）=====
      - name: Decode release keystore
        if: steps.buildtype.outputs.type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::RELEASE_KEYSTORE_BASE64 未配置，release 构建将失败"
            exit 1
          fi
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/release.jks
          ls -la app/keystore/release.jks

      # ===== 7. 写入签名属性（仅 release）=====
      - name: Write keystore.properties
        if: steps.buildtype.outputs.type == 'release'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=keystore/release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
          cat keystore.properties

      # ===== 8. 编译 =====
      - name: Run ${{ steps.buildtype.outputs.type }} build
        uses: gradle/actions/run-gradle@v4
        with:
          arguments: |
            ${{ steps.buildtype.outputs.type == 'release' && 'assembleRelease' || 'assembleDebug' }}
            -Pandroid.injected.signing.store.file=${{ steps.buildtype.outputs.type == 'release' && 'keystore/release.jks' || '' }}
          gradle-home-cache-cleanup: true

      # ===== 9. 验证 APK 产出 =====
      - name: Verify APK output
        run: |
          echo "===== 产出列表 ====="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo "===== APK 内容快查 ====="
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            unzip -l "$APK" | head -20
            $ANDROID_HOME/build-tools/*/aapt dump badging "$APK" 2>/dev/null | head -5 || true
          fi

      # ===== 10. 上传 APK 为 artifact =====
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: teleprompter-${{ steps.buildtype.outputs.type }}-apk
          path: |
            app/build/outputs/apk/${{ steps.buildtype.outputs.type }}/*.apk
            app/build/outputs/apk/${{ steps.buildtype.outputs.type }}/*.json
          if-no-files-found: error
          retention-days: 30

      # ===== 11. 单元测试报告（可选）=====
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 7